<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="node_modules/github-markdown-css/github-markdown.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    header {
      padding: 12px 16px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .buttons button {
      padding: 6px 12px;
      margin-left: 8px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .buttons button:hover {
      background: #f3f4f6;
    }
    
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .editor-pane {
      border-right: 1px solid #d0d7de;
    }
    
    textarea {
      flex: 1;
      padding: 16px;
      border: none;
      resize: none;
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
    }
    
    #preview {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #fff;
    }
    
    footer {
      padding: 8px 16px;
      background: #f6f8fa;
      border-top: 1px solid #d0d7de;
      font-size: 12px;
      color: #57606a;
      display: flex;
      gap: 20px;
    }
  </style>
</head>
<body>
  <header>
    <div class="title">📝 Markdown Editor</div>
    <div class="buttons">
      <button id="btn-open">📂 열기</button>
      <button id="btn-save">💾 저장</button>
    </div>
  </header>
  
  <main>
    <div class="pane editor-pane">
      <textarea id="editor" placeholder="# 여기에 마크다운을 작성하세요...

## 예시

- 리스트 1
- 리스트 2
- 리스트 3

**굵게** *이탤릭*"></textarea>
    </div>
    
    <div class="pane">
      <div id="preview" class="markdown-body"></div>
    </div>
  </main>
  
  <footer>
    <span id="status">준비됨</span>
    <span id="file-path"></span>
  </footer>
  
  <script src="node_modules/marked/lib/marked.umd.js"></script>
  <script src="node_modules/dompurify/dist/purify.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
