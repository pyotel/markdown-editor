<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="node_modules/easymde/dist/easymde.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    header {
      padding: 12px 16px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .buttons button {
      padding: 6px 12px;
      margin-left: 8px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .buttons button:hover {
      background: #f3f4f6;
    }
    
    main {
      flex: 1;
      overflow: hidden;
    }
    
    #editor-container {
      height: 100%;
    }
    
    .EasyMDEContainer {
      height: 100%;
    }
    
    .CodeMirror {
      height: calc(100vh - 100px) !important;
      font-size: 14px;
    }
    
    footer {
      padding: 8px 16px;
      background: #f6f8fa;
      border-top: 1px solid #d0d7de;
      font-size: 12px;
      color: #57606a;
    }
  </style>
</head>
<body>
  <header>
    <div class="title">📝 Markdown Editor</div>
    <div class="buttons">
      <button id="btn-open">📂 열기</button>
      <button id="btn-save">💾 저장</button>
      <button id="btn-preview">👁️ 미리보기</button>
    </div>
  </header>
  
  <main>
    <div id="editor-container">
      <textarea id="editor"></textarea>
    </div>
  </main>
  
  <footer>
    <span id="status">준비됨</span>
    <span id="file-path" style="margin-left: 20px;"></span>
  </footer>
  
  <script src="node_modules/easymde/dist/easymde.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
